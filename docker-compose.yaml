services:
  postgres:
    image: pgvector/pgvector:0.8.1-pg18-trixie
    container_name: postgres-wersu
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: db
    ports:
      - "5433:5432"
    volumes:
      - ./data/pgvector:/var/lib/postgresql
      - ./pgvector_init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "psql -U spicedb -d spicedb -c 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  pgweb:
    container_name: pgweb_helper
    restart: always
    image: sosedoff/pgweb
    ports: 
      - "8081:8081" 
    links: 
      - postgres:postgres  # my database container is called postgres, not db
    environment:
      - PGWEB_DATABASE_URL=postgres://postgres:postgres@postgres:5432/db?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  # when using postgres as datastore for spicedb, we need to run the migrate command before starting the server
  spicedb-migrate:
    image: authzed/spicedb:latest
    container_name: spicedb-migrate
    command:
      - datastore
      - migrate
      - head
      - --datastore-engine=postgres
      - --datastore-conn-uri=postgres://spicedb:spicedb@postgres:5432/spicedb?sslmode=disable
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
      
  spicedb:
    image: authzed/spicedb:latest
    container_name: spicedb
    command:
      - serve
      - --http-enabled=false
      - --grpc-preshared-key=somerandomkeyhere
      - --datastore-engine=postgres
      # user is created in the pgvector_init.sql
      - --datastore-conn-uri=postgres://spicedb:spicedb@postgres:5432/spicedb?sslmode=disable  
    ports:
      - "50051:50051" # gRPC
      - "8443:8443"   # HTTP
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      spicedb-migrate:
        condition: service_completed_successfully

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: i-will-find-it-app
    restart: unless-stopped
    environment:
      DATABASE_DSN: postgres://postgres:postgres@postgres:5432/db?sslmode=disable
      GRPC_HOST: 0.0.0.0
      GRPC_PORT: "50052"
      GRPC_SPICEDB_CREDENTIALS: somerandomkeyhere
      GRPC_SPICEDB_ADDRESS: spicedb:50051
    ports:
      - "50052:50052"
    depends_on:
      postgres:
        condition: service_healthy
      spicedb:
        condition: service_started

  openinary:
    image: openinary/openinary:v0.1.7
    platform: linux/amd64
    #ports:
    #  - "3000:3000"
    # it seems like 3 ports are used: 3001 for web, 3002 for api and 3000 as proxy for both
    # hence forward port 3000 with traeffik
    environment:
      BETTER_AUTH_URL: ${OPENINARY_URL}
      CORS_ORIGIN: ${OPENINARY_CORS_ORIGIN:-http://localhost:5173}
    volumes:
      - ./data/openinary/cache:/app/apps/api/cache
      - ./data/openinary/public:/app/apps/api/public
      - ./data/openinary/db:/app/data