syntax = "proto3";
import "google/protobuf/timestamp.proto";

package proto;
option go_package = "github.com/KuramaSyu/Wersu-Rest/src/proto;proto";

// Request for getting a note by id
message GetNoteRequest {
    string id = 1;
    string user_id = 2;
}

message GetSearchNotesRequest {
    enum SearchType {
        Undefined = 0;      // default
        NoSearch = 1;       // latest notes
        FullTextTitle = 2;  // exact match search
        Fuzzy = 3;          // typo tolerant search
        Context = 4;        // semantic search using embeddings
    }
    // Search parameters
    SearchType search_type = 1;
    string query = 2;

    // Pagination
    int32 limit = 3;
    int32 offset = 4;

    // authentication
    string user_id = 5;
}

message NotesReply {
    repeated MinimalNote notes = 1;

    // the directories which appear in the note results
    repeated MinimalDirectory directories = 2;

    // the tags which appear in the note results
    repeated MinimalTag tags = 3;
}

// Response: represents a minimal Note for search results
message MinimalNote {
    string id = 1; // Note ID (UUIDv7 string)
    string title = 2;
    string author_id = 3;
    google.protobuf.Timestamp updated_at = 4;
    string stripped_content = 5;
    repeated PermissionRelationship permissions = 6;
    repeated string directory_ids = 7;
    repeated string tag_ids = 8;
}

message MinimalDirectory {
    string id = 1; 
    string slug = 2;
    string display_name = 3;
}

message MinimalTag {
    string id = 1;
    string slug = 2;
    string display_name = 3;
}

// Response: represents a Note
message Note {
    reserved 6;
    string id = 1;
    string title = 2;
    string content = 3;
    google.protobuf.Timestamp updated_at = 4;
    string author_id = 5;
    //repeated NoteEmbedding embeddings = 6;
    repeated PermissionRelationship permissions = 7;
    repeated string directory_ids = 8;
    repeated string tag_ids = 9;
}

message NoteResponse {
    Note note = 1;
    map<string, string> id_token_map = 2;
}

message NoteEmbedding {
    string model = 1;
    repeated float embedding = 2;
}

// Request to add a note
message PostNoteRequest {
    string title = 1;
    optional string content = 2;
    string author_id = 3;

    // the id of the user making the request - used for permission checking
    string user_id = 4;
}

// Request to delete a note
message DeleteNoteRequest {
    string id = 1;

    // the id of the user making the request - used for permission checking
    string user_id = 2;
}

// Request to alter a note. Any omitted fields will be left unchanged, and any repeated fields will be replaced with the new values.
message AlterNoteRequest {
    string id = 1;
    optional string title = 2;
    optional string content = 3;
    optional string author_id = 4;
    repeated string directory_ids = 5;
    repeated string tag_ids = 6;
    // the user_id of the user making the request, used for permission checking
    string user_id = 7;
}

message Directory {
    string id = 1;
    string slug = 2;
    string display_name = 3;
    string description = 4;
    string image_url = 5;
    repeated string parent_dir_ids = 6;
    repeated PermissionRelationship relationships = 7;
    repeated string child_dir_ids = 8;
    repeated string child_note_ids = 9;
}

message GetDirectoryRequest {
    string id = 1;
    string user_id = 2;
    bool include_parents = 3;
    bool include_child_dirs = 4;
    bool include_child_notes = 5;
}

// list all directory contents of a given directory <parent_id>
message GetDirectoriesRequest {
    // the requesting user's id, used for permission checking
    string user_id = 1;
    optional string parent_id = 2;
    optional int32 limit = 3;
    optional int32 offset = 4;
    bool include_parents = 5;
    bool include_child_dirs = 6;
    bool include_child_notes = 7;
}

message CreateDirectoryRequest {
    string name = 1;
    optional string display_name = 2;
    optional string description = 3;
    optional string image_url = 4;
    repeated string parent_ids = 5;
    // the user_id of the user making the request, used for permission checking
    // its also the author of the directory
    string user_id = 6;
}

// any ommited fields will be left unchanged 
// and any repeated fields will be replaced with the new values. 
message AlterDirectoryRequest {
    string id = 1;
    optional string name = 2;
    optional string display_name = 3;
    optional string description = 4;
    optional string image_url = 5;
    repeated string parent_ids = 6;
    string user_id = 7;
}

message DeleteDirectoryRequest {
    string id = 1;
    string user_id = 2;
}

message GetNotesOfDirectoryRequest {
    string directory_id = 1;
    int32 limit = 2;
    int32 offset = 3;
    string user_id = 4;
}

enum PermissionObjectType {
    PERMISSION_OBJECT_TYPE_UNSPECIFIED = 0;
    PERMISSION_OBJECT_TYPE_NOTE = 1;
    PERMISSION_OBJECT_TYPE_DIRECTORY = 2;
    PERMISSION_OBJECT_TYPE_USER = 3;
    PERMISSION_OBJECT_TYPE_ATTACHMENT = 4;
}

message PermissionSubject {
    PermissionObjectType object_type = 1;
    string object_id = 2;
}

message PermissionResource {
    PermissionObjectType object_type = 1;
    string object_id = 2;
}

message PermissionRelationship {
    string relation = 1;
    PermissionSubject subject = 2;
    PermissionResource resource = 3;
}

message GetPermissionsRequest {
    PermissionObjectType object_type = 1;
    string object_id = 2;
    string user_id = 3;
}

message CreatePermissionRequest {
    PermissionObjectType object_type = 1;
    string object_id = 2;
    PermissionRelationship relationship = 3;
    string user_id = 4;
}

message DeletePermissionRequest {
    PermissionObjectType object_type = 1;
    string object_id = 2;
    PermissionRelationship relationship = 3;
    string user_id = 4;
}

message ReplacePermissionsRequest {
    PermissionObjectType object_type = 1;
    string object_id = 2;
    repeated PermissionRelationship relationships = 3;
    string user_id = 4;
}

message PermissionsResponse {
    PermissionObjectType object_type = 1;
    string object_id = 2;
    repeated PermissionRelationship relationships = 3;
}

// Versioning requests and responses
message NoteVersionSummary {
    string version_id = 1;
    string note_id = 2;
    int64 version_index = 3;
    google.protobuf.Timestamp created_at = 4;
    string author_id = 5;
    bool is_snapshot = 6;
    string snapshot_id = 7;
}

message GetNoteVersionsRequest {
    string note_id = 1;
    optional int32 limit = 2;
    optional int32 offset = 3;
    string user_id = 4;
}

message GetDirectoryActivityRequest {
    optional string directory_id = 1;
    optional int32 max_depth = 2;
    optional int32 limit = 3;
    optional int32 offset = 4;
    string user_id = 5;
}

message NoteVersionContent {
    string note_id = 1;
    int64 version_index = 2;
    google.protobuf.Timestamp created_at = 3;
    string author_id = 4;
    string title = 5;
    string content = 6;
}

message GetNoteVersionContentRequest {
    string note_id = 1;
    int64 version_index = 2;
    string user_id = 3;
}

message RestoreNoteVersionRequest {
    string note_id = 1;
    int64 version_index = 2;
    string user_id = 3;
}

// Note Service
service NoteService {
    // GetNote returns a Note from DB. If the user is a public/temp user,
    // then an additional id_token_map will be returned, containing a
    // JWT for each attachment in the file. 
    rpc GetNote(GetNoteRequest) returns (NoteResponse);
    rpc PostNote(PostNoteRequest) returns (Note);
    rpc PatchNote(AlterNoteRequest) returns (Note);
    rpc DeleteNote(DeleteNoteRequest) returns (Note);
    rpc SearchNotes(GetSearchNotesRequest) returns (NotesReply);
}

service DirectoryService {
    rpc GetDirectory(GetDirectoryRequest) returns (Directory);
    rpc GetDirectories(GetDirectoriesRequest) returns (stream Directory);
    rpc CreateDirectory(CreateDirectoryRequest) returns (Directory);
    rpc PatchDirectory(AlterDirectoryRequest) returns (Directory);
    rpc DeleteDirectory(DeleteDirectoryRequest) returns (Directory);
    rpc GetNotesOfDirectory(GetNotesOfDirectoryRequest) returns (NotesReply);
}

service PermissionService {
    rpc GetPermissions(GetPermissionsRequest) returns (PermissionsResponse);
    rpc CreatePermission(CreatePermissionRequest) returns (PermissionsResponse);
    rpc DeletePermission(DeletePermissionRequest) returns (PermissionsResponse);
    rpc ReplacePermissions(ReplacePermissionsRequest) returns (PermissionsResponse);
}

service NoteVersionService {
    rpc GetNoteVersions(GetNoteVersionsRequest) returns (stream NoteVersionSummary);
    rpc GetDirectoryActivity(GetDirectoryActivityRequest) returns (stream NoteVersionSummary);
    rpc GetNoteVersionContent(GetNoteVersionContentRequest) returns (NoteVersionContent);
    rpc RestoreNoteVersion(RestoreNoteVersionRequest) returns (Note);
}