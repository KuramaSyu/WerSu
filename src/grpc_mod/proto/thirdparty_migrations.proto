syntax = "proto3";

package proto;
option go_package = "github.com/KuramaSyu/Wersu-Rest/src/proto;proto";

// One chunk of a streamed BookStack book zip. The first chunk in the
// stream carries `user_id`; subsequent chunks may leave it empty.
//
// `content` holds raw bytes of the zip (or a slice of them when the
// client chooses to chunk the upload).
message BookstackBookImportChunk {
    string user_id = 1;
    bytes content = 2;
}

// One chapter directory that was created during the import.
message BookstackImportedChapter {
    string directory_id = 1;
    string chapter_name = 2;
    int32 pages_imported = 3;
}

// Result returned once the BookStack book zip has been fully imported.
message BookstackBookImportResponse {
    string book_directory_id = 1;
    repeated BookstackImportedChapter chapters = 2;
    int32 pages_imported = 3;
    int32 attachments_uploaded = 4;
}

// Service that imports content from third-party documentation tools
// into the project's directory / note / attachment model.
//
// Only the BookStack book import is implemented today; further RPCs
// will be added here for other sources (Notion, Confluence, ...).
service ThirdpartyMigrationsService {
    rpc BookstackBookImport(stream BookstackBookImportChunk)
        returns (BookstackBookImportResponse);
}