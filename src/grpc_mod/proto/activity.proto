syntax = "proto3";

import "google/protobuf/timestamp.proto";

package proto;
option go_package = "github.com/KuramaSyu/Wersu-Rest/src/proto;proto";

// Discriminator for who was acting when an event happened.
enum AccessedAs {
    ACCESSED_AS_UNSPECIFIED = 0;
    ACCESSED_AS_USER = 1;
    ACCESSED_AS_SYSTEM = 2;
}

// Discriminator for the scoring strategy used in an ActivityScore.
enum MostUsedAlgorithm {
    MOST_USED_ALGORITHM_UNSPECIFIED = 0;
    MOST_USED_ALGORITHM_COUNT = 1;
    MOST_USED_ALGORITHM_LOG_COUNT = 2;
}

// One row from the activity log.
message Activity {
    string id = 1;
    string actor_id = 2;
    AccessedAs accessed_as = 3;
    string action = 4;
    string note_id = 5;
    string directory_id = 6;
    string role_id = 7;
    google.protobuf.Timestamp at = 8;
    string metadata_json = 9;
}

// Aggregate score for one note plus its title and stripped content.
message ActivityScore {
    string note_id = 1;
    double score = 2;
    string title = 3;
    string stripped_content = 4;
}

// History filter for both RPCs.
message ActivityFilter {
    string note_id = 1;
    string directory_id = 2;
    string actor_id = 3;
    string role_id = 4;
    AccessedAs accessed_as = 5;
    repeated string actions = 6;
    optional int32 days = 7;
    optional int32 limit = 8;
    optional int32 offset = 9;
    optional bool unique_per_day = 10;
}

// Request for GetActivityHistory.
message GetActivityHistoryRequest {
    string user_id = 1;
    ActivityFilter filter = 2;
}

// Request for GetMostUsedActivity.
message GetMostUsedActivityRequest {
    string user_id = 1;
    ActivityFilter filter = 2;
    MostUsedAlgorithm algorithm = 3;
    optional int32 limit = 4;
}

service ActivityStatisticsService {
    // Streams the activity log for everything the actor can view.
    rpc GetActivityHistory(GetActivityHistoryRequest) returns (stream Activity);

    // Streams aggregate note scores for everything the actor can view.
    rpc GetMostUsedActivity(GetMostUsedActivityRequest) returns (stream ActivityScore);
}