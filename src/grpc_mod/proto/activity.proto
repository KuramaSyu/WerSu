syntax = "proto3";

import "google/protobuf/timestamp.proto";

package proto;
option go_package = "github.com/KuramaSyu/Wersu-Rest/src/proto;proto";

// How the actor was acting when the event happened.
enum AccessedAs {
    ACCESSED_AS_UNSPECIFIED = 0;
    ACCESSED_AS_USER = 1;
    ACCESSED_AS_SYSTEM = 2;
}

// Which scoring algorithm produced the score in an ActivityScore.
enum MostUsedAlgorithm {
    MOST_USED_ALGORITHM_UNSPECIFIED = 0;
    MOST_USED_ALGORITHM_COUNT = 1;
    MOST_USED_ALGORITHM_LOG_COUNT = 2;
}

// One row from the activity log.
message Activity {
    string id = 1;
    string actor_id = 2;
    AccessedAs accessed_as = 3;
    string action = 4;
    string note_id = 5;
    string directory_id = 6;
    string role_id = 7;
    google.protobuf.Timestamp at = 8;
    string metadata_json = 9;
}

// Aggregate score for a single note from a ``most_used`` query.
message ActivityScore {
    string note_id = 1;
    double score = 2;
}

// History filter. Empty fields mean "do not filter on this column".
// ``unique_per_day`` collapses repeats to one count per (actor, day)
// pair before aggregating; it composes with any algorithm.
message ActivityFilter {
    string note_id = 1;
    string directory_id = 2;
    string actor_id = 3;
    string role_id = 4;
    AccessedAs accessed_as = 5;
    repeated string actions = 6;
    optional int32 days = 7;
    optional int32 limit = 8;
    optional int32 offset = 9;
    optional bool unique_per_day = 10;
}

// Request for ``GetActivityHistory``. The requester user_id is used
// for permission checks and to scope "all visible directories".
message GetActivityHistoryRequest {
    string user_id = 1;
    ActivityFilter filter = 2;
}

// Request for ``GetMostUsedActivity``. Same permission semantics as
// ``GetActivityHistory``; ``algorithm`` defaults to ``count``.
message GetMostUsedActivityRequest {
    string user_id = 1;
    ActivityFilter filter = 2;
    MostUsedAlgorithm algorithm = 3;
    optional int32 limit = 4;
}

service ActivityStatisticsService {
    // Stream the activity log for everything the actor can view.
    rpc GetActivityHistory(GetActivityHistoryRequest) returns (stream Activity);

    // Stream aggregate note scores for everything the actor can view.
    rpc GetMostUsedActivity(GetMostUsedActivityRequest) returns (stream ActivityScore);
}