[pytest]
asyncio_mode = auto
addopts = -m "not integration and not poc"
; per default run unit tests only
; tests/integration/ is the home for tests that need real
; containers (Postgres, SpiceDB, Garage) via testcontainers;
; they are excluded from the default run and require Docker.
; run them explicitly with: uv run pytest tests/integration/
; pocs/ is the home for exploratory scripts; they are not part of the regular suite
; run them explicitly with: uv run pytest pocs/ -m poc
testpaths =
    tests
    pocs
filterwarnings =
    ignore:The @wait_container_is_ready decorator is deprecated:DeprecationWarning
    ignore:The wait_for_logs function with string or callable predicates is deprecated:DeprecationWarning:testcontainers_spicedb.spicedb:67
markers =
    integration: tests that exercise the real Postgres/SpiceDB/Garage stack via testcontainers
    spicedb: tests that require a real SpiceDB instance
    poc: proof-of-concept or exploratory tests; not part of the regular suite