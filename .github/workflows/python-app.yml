# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Build Python Service

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        python-version: "3.14"
    - name: Install dependencies
      run: |
        uv sync --frozen
    # - name: Lint with flake8
    #   run: |
    #     # stop the build if there are Python syntax errors or undefined names
    #     flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
    #     # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
    #     flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Test fast suite
      run: |
        uv run pytest tests/
    - name: Verify Docker is available
      run: |
        docker info >/dev/null
    - name: Pre-pull testcontainer images
      run: |
        docker pull pgvector/pgvector:0.8.1-pg18-trixie
        docker pull authzed/spicedb:v1.47.1
        docker pull dxflrs/garage:v2.3.0
    - name: Test integration suite (Postgres + SpiceDB + Garage via testcontainers)
      run: |
        uv run pytest -m "integration and not poc" tests/
